<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadi Ka Nimantran</title>
    <style>
        @import url('https://googleapis.com');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #3d030c;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- COVER PAGE STYLES --- */
        .cover-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #800020, #4a0012);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out;
            text-align: center;
            color: #ffffff;
            padding: 20px;
        }

        .cover-page.hide {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .cover-content {
            border: 2px solid #e2bc74;
            padding: 40px 20px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
            background: rgba(128, 0, 32, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .open-btn {
            background-color: #a31d27;
            color: #f7e7c4;
            border: 2px solid #e2bc74;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .open-btn:hover {
            background-color: #e2bc74;
            color: #330000;
            transform: scale(1.05);
        }

        /* --- MAIN TRADITIONAL CARD STYLES --- */
        .card-container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.8s ease-in-out;
            transition-delay: 0.2s;
            pointer-events: none;
            margin: 20px 0;
        }

        body.card-visible .card-container {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        body.card-visible {
            overflow: auto;
        }

        .panel {
            background-color: #f7e7c4; 
            border: 8px double #a31d27;
            padding: 25px;
            color: #a31d27;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        .panel::before, .panel::after {
            content: "◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆";
            display: block;
            font-size: 10px;
            letter-spacing: 2px;
            color: #a31d27;
            opacity: 0.5;
            margin: 5px 0;
        }

        .ganesh-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Yatra One', cursive;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .ganesh-icon {
            font-size: 28px;
        }

        .section-title {
            background-color: #a31d27;
            color: #f7e7c4;
            display: inline-block;
            padding: 4px 25px;
            font-family: 'Yatra One', cursive;
            font-size: 16px;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        /* --- TOP PANEL: KARYAKRAM --- */
        .karyakram-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .event-box {
            border: 2px dashed #a31d27;
            padding: 15px;
            border-radius: 50% 50% 0 0; 
            background: #fff6e0;
        }

        .event-name {
            font-family: 'Yatra One', cursive;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .event-date {
            background-color: #a31d27;
            color: #f7e7c4;
            display: inline-block;
            padding: 2px 15px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 3px;
        }

        .barat-section {
            margin: 20px 0;
        }

        .barat-title {
            background-color: #a31d27;
            color: #f7e7c4;
            display: inline-block;
            padding: 2px 15px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .barat-date {
            font-family: 'Yatra One', cursive;
            font-size: 18px;
            font-weight: bold;
        }

        .poetry-box {
            border: 1px solid #a31d27;
            padding: 10px;
            font-style: italic;
            font-size: 13px;
            line-height: 1.6;
            margin: 15px 0;
            background-color: #fff9ed;
            font-weight: 500;
        }

        .venue-info {
            font-family: 'Yatra One', cursive;
            font-size: 15px;
            margin-top: 10px;
        }

        /* --- BOTTOM PANEL: INVITATION --- */
        .manyavar-text {
            font-family: 'Yatra One', cursive;
            font-size: 16px;
            text-align: left;
            margin-bottom: 5px;
        }

        .invitation-line {
            font-size: 14px;
            margin-bottom: 25px;
            text-align: left;
            text-indent: 40px;
        }

        .couple-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .biodata-circle {
            border: 3px dotted #a31d27;
            border-radius: 50%;
            padding: 20px 15px;
            min-height: 175px;
            width: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #fff6e0;
        }

        .main-name {
            font-family: 'Yatra One', cursive;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            background: #a31d27;
            color: #f7e7c4;
            padding: 2px 0;
            border-radius: 15px;
        }

        .sub-details {
            font-size: 11px;
            line-height: 1.5;
            font-weight: 500;
        }

        .center-art {
            font-size: 35px;
        }

        .request-text {
            font-size: 13px;
            font-weight: 600;
            max-width: 450px;
            margin: 20px auto;
            line-height: 1.5;
            border-left: 3px solid #a31d27;
            border-right: 3px solid #a31d27;
            padding: 0 10px;
        }

        /* Footer Family Sections */
        .family-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 30px;
            border-top: 1px dashed #a31d27;
            padding-top: 15px;
        }

        .family-box {
            font-size: 12px;
        }

        .family-box h4 {
            background-color: #a31d27;
            color: #f7e7c4;
            display: inline-block;
            padding: 2px 10px;
            font-size: 12px;
            margin-bottom: 8px;
            border-radius: 2px;
        }

        .family-names {
            font-weight: 500;
            line-height: 1.5;
        }

        /* Responsive Layout for Mobile */
        @media (max-width: 650px) {
            .karyakram-grid {
                grid-template-columns: 1fr;
            }
            .couple-container {
                flex-direction: column;
            }
            .center-art {
                transform: rotate(90deg);
                margin: 5px 0;
            }
            .family-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- STARTING COVER PAGE -->
    <div class="cover-page" id="coverPage">
        <div class="cover-content">
            <span style="font-size: 50px; color: #e2bc74; margin-bottom: 10px;">🔱</span>
            <h1 style="font-family: 'Yatra One', cursive; font-size: 28px; color: #e2bc74;">वैवाहिक आमंत्रण पत्रिका</h1>
            <p style="font-size: 14px; color: #fff; margin-top: 5px; letter-spacing: 1px;">चौहान परिवार</p>
            <button class="open-btn" onclick="openCard()">Open Invitation</button>
        </div>
    </div>

    <!-- MAIN TRADITIONAL MULTI-PANEL CARD -->
    <div class="card-container" id="mainCard">
        
        <!-- FIRST TOP PANEL: KARYAKRAM -->
        <div class="panel">
            <div class="ganesh-header">
                <span class="ganesh-icon">🪔</span>
                <span>।। श्री गणेशाय नमः ।।</span>
                <span class="ganesh-icon">🪔</span>
            </div>

            <div class="section-title">वैवाहिक कार्यक्रम</div>

            <div class="karyakram-grid">
                <div class="event-box">
