<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadi Ka Nimantran</title>
    <style>
        @import url('https://googleapis.com');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #3d030c;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow-x: hidden;
        }

        /* --- COVER PAGE STYLES --- */
        .cover-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #800020, #4a0012);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out;
            text-align: center;
            color: #ffffff;
            padding: 20px;
        }

        .cover-page.hide {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .cover-content {
            border: 2px solid #e2bc74;
            padding: 40px 20px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
            background: rgba(128, 0, 32, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .open-btn {
            background-color: #a31d27;
            color: #f7e7c4;
            border: 2px solid #e2bc74;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .open-btn:hover {
            background-color: #e2bc74;
            color: #330000;
            transform: scale(1.05);
        }

        /* --- MAIN PHOTO LAYOUT CARD --- */
        .card-container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.8s ease-in-out;
            pointer-events: none;
        }

        body.card-visible .card-container {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        body.card-visible {
            overflow: auto;
        }

        .panel {
            background-color: #f7e7c4; /* Cream Background from Photo */
            border: 6px double #a31d27;
            padding: 20px;
            color: #a31d27;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            text-align: center;
        }

        /* Top/Bottom Traditional Borders */
        .diamond-border {
            font-size: 9px;
            letter-spacing: 2px;
            color: #a31d27;
            opacity: 0.6;
            margin: 5px 0;
        }

        .ganesh-header {
            font-family: 'Yatra One', cursive;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .section-title {
            background-color: #a31d27;
            color: #f7e7c4;
            display: inline-block;
            padding: 2px 20px;
            font-family: 'Yatra One', cursive;
            font-size: 15px;
            border-radius: 3px;
            margin-bottom: 15px;
        }

        /* --- PANEL 1: KARYAKRAM (Exact Photo Design) --- */
        .top-row-events {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .event-box {
            border: 2px dashed #a31d27;
            padding: 10px 15px;
            border-radius: 50% 50% 0 0; /* Dome Shape from Photo */
            background: #fff6e0;
            min-width: 200px;
        }

        .event-name {
            font-family: 'Yatra One', cursive;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .event-date {
            background-color: #a31d27;
            color: #f7e7c4;
            display: inline-block;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 2px;
        }

        .barat-title {
            background-color: #a31d27;
            color: #f7e7c4;
            display: inline-block;
            padding: 2px 15px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 2px;
            margin-bottom: 3px;
        }

        .barat-date {
            font-family: 'Yatra One', cursive;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .poetry-box {
            border: 1px solid #a31d27;
            padding: 8px;
            font-style: italic;
            font-size: 13px;
            line-height: 1.5;
            margin: 10px auto;
            max-width: 700px;
            background-color: #fff9ed;
            font-weight: 500;
        }

        .venue-info {
            font-family: 'Yatra One', cursive;
            font-size: 14px;
        }

        /* --- PANEL 2: INVITATION PANEL (Exact Photo Text Alignment) --- */
        .manyavar-header {
            text-align: left;
            font-family: 'Yatra One', cursive;
            font-size: 15px;
            margin-left: 20px;
        }

        .krupa-text {
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Photo Column Structure for Details */
        .details-columns {
            display: grid;
            grid-template-columns: 1fr 0.3fr 1fr;
            align-items: center;
            margin: 15px 0;
            text-align: center;
        }

        .bio-data-block {
            padding: 10px;
        }

        .profile-title {
            font-family: 'Yatra One', cursive;
            font-size: 18px;
            font-weight: bold;
            color: #a31d27;
            margin-bottom: 5px;
        }

        .bio-text {
            font-size: 12px;
            line-height: 1.6;
            font-weight: 500;
        }

        .center-separator {
            font-size: 30px;
        }

        .blessing-text {
            font-size: 13px;
            font-weight: 600;
            max-width: 500px;
            margin: 15px auto;
            line-height: 1.4;
        }

        /* Bottom 3 Columns Footer from Photo */
        .footer-sections {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-top: 1px dashed #a31d27;
            margin-top: 20px;
            padding-top: 10px;
            gap: 10px;
        }

        .footer-column {
            font-size: 11px;
            border-right: 1px solid rgba(163, 29, 39, 0.2);
        }

        .footer-column:last-child {
            border-right: none;
        }

        .footer-column h4 {
            background-color: #a31d27;
            color: #f7e7c4;
            display: inline-block;
            padding: 2px 8px;
            font-size: 11px;
            margin-bottom: 5px;
            border-radius: 2px;
            font-family: 'Yatra One', cursive;
        }

        .footer-names {
            font-weight: 500;
            line-height: 1.4;
        }

        /* Mobile Layout Shift */
        @media (max-width: 600px) {
            .details-columns {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .center-separator {
                transform: rotate(90deg);
                margin: 5px 0;
            }
            .footer-sections {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .footer-column {
                border-right: none;
                border-bottom: 1px dashed rgba(163, 29, 39, 0.3);
                padding-bottom: 10px;
            }
            .footer-column:last-child {
                border-bottom: none;
            }
        }
    </style>
</head>
<body>

    <!-- STARTING COVER PAGE -->
    <div class="cover-page" id="coverPage">
        <div class="cover-content">
            <span style="font-size: 50px; color: #e2bc74; margin-bottom: 10px;">🔱</span>
            <h1 style="font-family: 'Yatra One', cursive; font-size: 28px; color: #e2bc74;">वैवाहिक कार्यक्रम</h1>
            <p style="font-size: 14px; color: #fff; margin-top: 5px; letter-spacing: 1px;">चौहान परिवार</p>
            <button class="open-btn" onclick="openCard()">Open Invitation</button>
        </div>
    </div>

    <!-- MAIN TRADITIONAL CARD CONTAINER -->
    <div class="card-container" id="mainCard">
        
        <!-- PANEL 1: KARYAKRAM -->
        <div class="panel">
            <div class="diamond-border">◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆ ◇ ◆</div>
            <div class="ganesh-header">।। श्री गणेशाय नमः ।।</div>
            <div class="section-title">वैवाहिक कार्यक्रम</div>

            <div class="top-row-events">
                <div class="event-box">
                    <div class="event-name">मण्डप / हल्दी</div>
                    <div class="event-date">3 जनवरी 2026 शनिवार</div>
                </div>
                <div class="event-box">
