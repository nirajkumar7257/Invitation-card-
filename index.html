<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वैवाहिक निमंत्रण पत्र</title>
    <style>
        /* Global Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Arial', sans-serif;
            background-color: #fdf5e6;
        }

        /* =======================================================
           1. FIRST PAGE: BRIGHT YELLOW COVER PAGE WITH BORDERS 
           ======================================================= */
        #cover-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffcc00; /* Shadi Ka Traditional Peela Rang */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            box-sizing: border-box;
            padding: 20px;
        }

        .envelope-container {
            width: 100%;
            max-width: 850px;
            min-height: 520px;
            background-color: #ffe680; 
            /* Traditional Maroon & Yellow Decorative Border */
            border: 15px solid #800000;
            border-image: repeating-linear-gradient(45deg, #800000, #800000 10px, #ffcc00 10px, #ffcc00 20px) 15;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
            position: relative;
            padding: 35px 30px;
            box-sizing: border-box;
            color: #800000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Border Flower Corners */
        .envelope-container::before, .envelope-container::after {
            content: "✿ ❁ ✿";
            font-size: 22px;
            color: #800000;
            position: absolute;
            width: 100%;
            left: 0;
            text-align: center;
        }
        .envelope-container::before { top: 8px; }
        .envelope-container::after { bottom: 8px; }

        .top-decor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            font-weight: bold;
        }
        .ganesha-art {
            font-size: 40px;
            line-height: 1;
        }
        
        .shubh-vivah-section {
            text-align: center;
            margin: 10px 0;
        }
        .shubh-vivah-logo {
            font-size: 36px;
            font-weight: bold;
            color: #800000;
            margin: 5px 0;
            letter-spacing: 2px;
        }
        .kalash-icon {
            font-size: 50px;
            line-height: 1;
        }

        .cover-middle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .left-heart-box {
            border: 3px dotted #800000;
            padding: 15px;
            border-radius: 10px;
            background: #fff5cc;
            text-align: center;
            min-width: 170px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        .heart-icon {
            font-size: 35px;
            color: #d11a2a;
            margin: 5px 0;
        }
        .names-inside {
            font-weight: bold;
            font-size: 18px;
        }

        .right-lines-box {
            flex: 1;
            margin-left: 40px;
            min-width: 280px;
        }
        .manyavar-text {
            font-size: 24px;
            font-weight: bold;
            text-align: left;
            margin-bottom: 10px;
        }
        .entry-line {
            border-bottom: 2px dashed #800000;
            margin-bottom: 18px;
            height: 15px;
            width: 100%;
        }

        /* Interactive pulse button */
        .btn-container {
            text-align: center;
            margin: 15px 0;
        }
        .invite-btn {
            background-color: #800000;
            color: #fff;
            border: 2px solid #ffcc00;
            padding: 14px 45px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, background-color 0.2s;
            animation: pulse 2s infinite;
        }
        .invite-btn:hover {
            background-color: #d11a2a;
            transform: scale(1.05);
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(128, 0, 0, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(128, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(128, 0, 0, 0); }
        }

        .cover-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-top: 15px;
            border-top: 2px dashed #800000;
            padding-top: 15px;
            font-size: 14px;
        }
        .vinit-box {
            text-align: left;
            line-height: 1.5;
        }
        .choohan-box {
            font-size: 19px;
            font-weight: bold;
            color: #800000;
        }

        /* =======================================================
           2. SECOND PAGE: MAIN DETAILS CARD STYLES
           ======================================================= */
        #main-card {
            display: none; /* Starting me hidden rahega */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }
        .card-container {
            width: 100%;
            max-width: 850px;
            background-color: #fffaf0;
            border: 20px solid #800000;
            border-image: repeating-linear-gradient(45deg, #800000, #800000 10px, #ffdf7a 10px, #ffdf7a 20px) 20;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.3);
            padding: 30px;
            box-sizing: border-box;
            color: #800000;
            text-align: center;
            position: relative;
        }
        .card-container::before, .card-container::after {
            content: "✿ ❁ ✿";
            font-size: 24px;
            color: #d11a2a;
            position: absolute;
            width: 100%;
            left: 0;
            text-align: center;
        }
        .card-container::before { top: 10px; }
        .card-container::after { bottom: 10px; }

        .header-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .title-box {
            background-color: #800000;
            color: #fff;
            display: inline-block;
            padding: 6px 30px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
            border: 2px solid #ffdf7a;
        }
        .events-grid {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .event-box {
            border: 2px dotted #800000;
            padding: 15px 25px;
            border-radius: 15px;
            margin: 10px;
            min-width: 200px;
            background-color: #fff3e0;
        }
        .event-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
        }
        .event-date {
            background-color: #800000;
            color: #fff;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 15px;
        }
        .barat-section {
            margin: 20px 0;
        }
        .barat-title {
            font-weight: bold;
            background-color: #800000;
            color: #fff;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .shayari {
            font-style: italic;
            font-size: 16px;
            margin: 20px auto;
            max-width: 85%;
            border-left: 5px solid #d11a2a;
            border-right: 5px solid #d11a2a;
            padding: 10px 20px;
            background-color: #fff5eb;
        }
        .venue {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 25px;
            color: #d11a2a;
        }
        .divider {
            font-size: 20px;
            margin: 25px 0;
        }
        .invitation-text {
            font-size: 18px;
            margin-bottom: 25px;
        }
        .couple-section {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .couple-box {
            border: 4px double #800000;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #fff;
        }
        .couple-name {
            font-size: 20px;
            font-weight: bold;
            color: #d11a2a;
            margin-bottom: 5px;
        }
        .parents-info {
            font-size: 13px;
        }
        .center-art {
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .footer-sections {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        <div id="cover-page">
    <div class="envelope-container">
        <div class="top-decor">
            <div class="ganesha-art">卐</div>
            <div style="text-align: center;">
                ॥ श्री गणेशाय नमः ॥<br>
                <span style="background:#800000; color:#fff; padding:2px 12px; border-radius:3px; font-size:11px; letter-spacing: 1px; font-weight: bold;">बुक-पोस्ट</span>
            </div>
            <div class="ganesha-art">卐</div>
        </div>

        <div class="shubh-vivah-section">

        </div>

        <div class="cover-middle">
            <div class="left-heart-box">
                <div class="names-inside">दिपाली</div>
                <div class="heart-icon">♥</div>
                <div class="names-inside">दीपक</div>
                <div style="background:#800000; color:#fff; font-size:11px; margin-top:10px; padding:5px; border-radius:3px; font-weight: bold;">
                    शुभ विवाह: 5 जन. 2026
                </div>
            </div>

            <div class="right-lines-box">
                <div class="manyavar-text">मान्यवर,</div>
                <div class="entry-line"></div>
                <div class="entry-line"></div>
                <div class="entry-line"></div>
            </div>
        </div>

        <div class="btn-container">
            <button class="invite-btn" onclick="openInvitation()">✉ आमंत्रण पत्र खोलें</button>
        </div>

        <div class="cover-footer">
            <div class="vinit-box">

            <div style="font-size: 32px; transform: scaleX(-1);">📯</div>
        </div>
    </div>
</div>

        <div class="invitation-text">

        <div class="footer-sections">

            <div class="footer-box">

<script>
    function openInvitation() {
        var cover = document.getElementById('cover-page');
        var mainCard = document.getElementById('main-card');
        
        cover.style.opacity = '0';
        cover.style.visibility = 'hidden';
        
        mainCard.style.display = 'flex';
    }
</script>
